name: luxury_hotel_app
description: A luxury hotel mobile app for booking hotels in Iraq with premium UI/UX design.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Dependencies
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  get_storage: ^2.1.1
  
  # UI & Design
  flutter_svg: ^2.0.7
  lottie: ^2.4.0
  smooth_page_indicator: ^1.1.0
  dotted_border: ^2.1.0
  flutter_animate: ^4.2.0
  glassmorphism: ^3.0.0
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.7.0
  firebase_remote_config: ^4.3.0
  
  # API & Networking
  dio: ^5.3.1
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  
  # Payment & Stripe
  stripe_flutter: ^10.0.0
  razorpay_flutter: ^1.3.7
  
  # Localization
  intl: ^0.19.0
  easy_localization: ^3.0.3
  
  # Biometric
  local_auth: ^2.1.0
  flutter_secure_storage: ^9.0.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  
  # Image & Media
  image_picker: ^1.0.4
  image_cropper: ^5.0.1
  photo_view: ^0.14.0
  cached_network_image: ^3.3.0
  
  # Date & Time
  intl_utils: ^2.8.5
  table_calendar: ^3.0.9
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.1.0
  
  # Charts & Analytics
  fl_chart: ^0.63.0
  syncfusion_flutter_charts: ^23.2.36
  
  # Notifications
  flutter_local_notifications: ^14.1.1
  
  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.1
  package_info_plus: ^4.1.0
  share_plus: ^7.1.0
  url_launcher: ^6.2.0
  
  # Logger
  logger: ^2.0.1
  
  # PDF
  pdf: ^3.10.7
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  retrofit_generator: ^7.0.3
  json_serializable: ^6.7.1
  freezed_annotation: ^2.4.1
  freezed: ^2.4.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/flags/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
